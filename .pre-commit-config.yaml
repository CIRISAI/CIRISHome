# CIRISHome Pre-commit Configuration
# Ensures code quality and security before commits

repos:
  # Standard Python formatting and linting
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: debug-statements
      - id: check-docstring-first

  # Python code formatting
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        language_version: python3
        args: ["--line-length=88"]

  # Import sorting
  - repo: https://github.com/pycqa/isort
    rev: 6.0.1
    hooks:
      - id: isort
        args: ["--profile", "black", "--line-length=88"]

  # Python linting
  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        args: ["--max-line-length=88", "--extend-ignore=E203,W503,I201"]
        additional_dependencies:
          - flake8-docstrings
        exclude: "^custom_components/ciris/ciris_sdk/"

  # Security scanning
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        args: ["--severity-level", "medium"]
        exclude: "^tests/"
        additional_dependencies:
          - pbr>=6.0.0

  # Type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.17.1
    hooks:
      - id: mypy
        additional_dependencies:
          - types-requests
          - types-PyYAML
        args: ["--ignore-missing-imports", "--show-error-codes"]
        exclude: "^(tests/|scripts/jetson-simulator\\.py|modules/voice_pe_pipeline/|custom_components/)"

  # Dockerfile linting
  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.1
    hooks:
      - id: hadolint-docker
        args: ["--ignore", "DL3008", "--ignore", "DL3009"]

  # Secrets detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: "^(tests/|custom_components/)"

  # YAML formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [yaml, json, markdown]
        exclude: "^external/"

  # Shell script linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: ["--severity=warning"]

  # Local hooks for CIRIS-specific validation
  - repo: local
    hooks:
      - id: validate-addon-config
        name: Validate CIRIS Agent addon config
        description: Ensures slug never changes and version is valid semver
        entry: python scripts/validate_addon.py
        language: python
        files: 'ciris-agent/config\.yaml$'
        additional_dependencies:
          - pyyaml
        pass_filenames: false

# Global excludes
exclude: |
  (?x)^(
      external/.*|
      CIRISVoice/.*|
      \.git/.*|
      __pycache__/.*|
      \.pytest_cache/.*|
      \.venv/.*|
      build/.*|
      dist/.*
  )$

# CI configuration
ci:
  autofix_commit_msg: |
    🤖 [pre-commit.ci] auto fixes from pre-commit.com hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ""
  autoupdate_commit_msg: "🤖 [pre-commit.ci] pre-commit autoupdate"
  autoupdate_schedule: weekly
  skip: []
  submodules: false
