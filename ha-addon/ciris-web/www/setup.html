<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIRIS Setup</title>
    <style>
        body {
            background-color: #0A0A0F;
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            max-width: 500px;
            text-align: center;
        }
        h1 {
            color: #6B9AFF;
            margin-bottom: 1rem;
        }
        .status {
            background: #12121A;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .success { color: #4CAF50; }
        .error { color: #f44336; }
        .info { color: #2196F3; }
        a {
            color: #6B9AFF;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CIRIS Setup</h1>
        <div id="status" class="status">
            <p class="info">Processing setup parameters...</p>
        </div>
    </div>

    <script>
        function getQueryParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                token: params.get('token'),
                baseUrl: params.get('baseUrl') || params.get('base_url'),
                refreshToken: params.get('refreshToken') || params.get('refresh_token')
            };
        }

        function setupApp() {
            const statusEl = document.getElementById('status');
            const params = getQueryParams();

            if (!params.token || !params.baseUrl) {
                statusEl.innerHTML = `
                    <p class="error">Missing required parameters.</p>
                    <p>Use: <code>setup.html?token=YOUR_TOKEN&baseUrl=http://your-ha:8123</code></p>
                    <p>Or run: <code>pip install ciris-home && ciris-home</code></p>
                `;
                return;
            }

            try {
                // Save to localStorage
                localStorage.setItem('ciris_access_token', params.token);
                localStorage.setItem('ciris_base_url', params.baseUrl);
                if (params.refreshToken) {
                    localStorage.setItem('ciris_refresh_token', params.refreshToken);
                }

                statusEl.innerHTML = `
                    <p class="success">Setup complete!</p>
                    <p>Base URL: ${params.baseUrl}</p>
                    <p>Token saved to localStorage</p>
                    <p><a href="/">Go to CIRIS</a></p>
                `;

                // Auto-redirect after 2 seconds
                setTimeout(() => {
                    window.location.href = '/';
                }, 2000);

            } catch (e) {
                statusEl.innerHTML = `
                    <p class="error">Setup failed: ${e.message}</p>
                `;
            }
        }

        // Run setup on load
        setupApp();
    </script>
</body>
</html>
